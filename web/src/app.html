<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <!--
      theme-color is read by the browser chrome before any stylesheet
      loads, so it has to be an inline hex. These two values are the
      brand guide's bg-dark (Dark Slate 80, §2.1) and bg-light
      (Warm Gray 85, §3.1) — kept in sync with brand-tokens.css §4/§5
      `--bg`. After Svelte hydrates, stores/theme.ts rewrites this from
      the live `--bg` so a runtime theme toggle stays consistent.
    -->
    <meta name="theme-color" content="#222A31" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F7F5F3" media="(prefers-color-scheme: light)" />
    <title>mqConnector</title>
    <!-- No-FOUC theme switch: read stored preference before SvelteKit hydrates. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('mqc-theme');
          var theme = stored || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
          var stored_dir = localStorage.getItem('mqc-dir');
          if (stored_dir === 'rtl') {
            document.documentElement.setAttribute('dir', 'rtl');
            document.documentElement.setAttribute('lang', 'ar');
          }
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <!--
    Aggressive prefetch on hover for both the route's JS bundle and the
    load() data. preload-code primes the chunk so the navigation paint
    is instant; preload-data primes any +page.ts result so the first
    render doesn't wait for the API. Combined effect: hovering a sidebar
    link for >50ms makes the click feel like a tab switch, not a fetch.
  -->
  <body data-sveltekit-preload-code="hover" data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
