# Prometheus recording + alerting rules for mqConnector.
#
# Two SLOs are encoded here, picked because they map directly to operator
# expectations and to metrics the binary already exposes at /api/metrics/prometheus:
#
#   1. Availability: per-pipeline message processing success rate over a
#      rolling 7-day window. Target: 99.9% (≤ 0.1% failure budget).
#   2. Latency:       per-pipeline avg end-to-end latency stays under
#      500ms for 99% of the messages over the same window.
#
# Both SLOs use a multi-burn-rate alerting strategy per Google SRE Workbook
# Ch. 5 — fast-burn pages the operator when an outage is consuming the
# weekly budget too quickly; slow-burn alerts when a creeping regression
# would exhaust it over days.
#
# Apply to Prometheus by mounting under /etc/prometheus/rules/ and adding
# `rule_files: [ "/etc/prometheus/rules/*.yaml" ]` to prometheus.yml.

groups:

  # ── 1) Availability SLO ──────────────────────────────────────────
  - name: mqconnector.availability.recording
    interval: 30s
    rules:
      - record: mqconnector:msg_total:rate5m
        expr: |
          sum by (pipeline_id) (
            rate(mqconnector_messages_processed_total[5m])
          )
          +
          sum by (pipeline_id) (
            rate(mqconnector_messages_failed_total[5m])
          )

      - record: mqconnector:msg_failed:rate5m
        expr: |
          sum by (pipeline_id) (
            rate(mqconnector_messages_failed_total[5m])
          )

      - record: mqconnector:availability:ratio5m
        expr: |
          1 - (
            mqconnector:msg_failed:rate5m
            /
            clamp_min(mqconnector:msg_total:rate5m, 0.001)
          )

      - record: mqconnector:availability:ratio1h
        expr: |
          1 - (
            sum by (pipeline_id) (rate(mqconnector_messages_failed_total[1h]))
            /
            clamp_min(
              sum by (pipeline_id) (rate(mqconnector_messages_processed_total[1h]))
              +
              sum by (pipeline_id) (rate(mqconnector_messages_failed_total[1h])),
              0.001
            )
          )

      - record: mqconnector:availability:ratio6h
        expr: |
          1 - (
            sum by (pipeline_id) (rate(mqconnector_messages_failed_total[6h]))
            /
            clamp_min(
              sum by (pipeline_id) (rate(mqconnector_messages_processed_total[6h]))
              +
              sum by (pipeline_id) (rate(mqconnector_messages_failed_total[6h])),
              0.001
            )
          )

  - name: mqconnector.availability.alerts
    rules:
      # Fast burn — at 14.4× the budget burn rate, a 1h breach exhausts
      # 2% of the weekly budget. Pages on-call.
      - alert: mqConnectorAvailabilityFastBurn
        expr: |
          (1 - mqconnector:availability:ratio5m) > (14.4 * (1 - 0.999))
          and
          (1 - mqconnector:availability:ratio1h) > (14.4 * (1 - 0.999))
        for: 2m
        labels:
          severity: critical
          slo: availability
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: availability fast-burn"
          description: |
            Pipeline {{ $labels.pipeline_id }} has failed {{ $value | humanizePercentage }} of
            messages over the last 5m. Burn rate is 14.4× the budget — at this rate, a 1h
            outage exhausts 2% of the weekly error budget.

      # Slow burn — 1× burn rate sustained over 6h indicates creeping
      # regression. Notifies (no page) so the operator can investigate.
      - alert: mqConnectorAvailabilitySlowBurn
        expr: |
          (1 - mqconnector:availability:ratio1h) > (1 * (1 - 0.999))
          and
          (1 - mqconnector:availability:ratio6h) > (1 * (1 - 0.999))
        for: 30m
        labels:
          severity: warning
          slo: availability
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: availability slow-burn"
          description: |
            Pipeline {{ $labels.pipeline_id }} has failed {{ $value | humanizePercentage }} of
            messages over the last 6h. Sustained slow burn — investigate before it consumes
            the weekly error budget.

  # ── 2) Latency SLO ───────────────────────────────────────────────
  - name: mqconnector.latency.alerts
    rules:
      - alert: mqConnectorLatencyHigh
        expr: mqconnector_avg_latency_ms > 500
        for: 10m
        labels:
          severity: warning
          slo: latency
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: avg latency > 500ms"
          description: |
            Pipeline {{ $labels.pipeline_id }} avg end-to-end latency is
            {{ $value | humanizeDuration }}ms over the last 10m. SLO threshold is 500ms.

      - alert: mqConnectorLatencyCritical
        expr: mqconnector_avg_latency_ms > 2000
        for: 5m
        labels:
          severity: critical
          slo: latency
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: avg latency > 2s"
          description: |
            Pipeline {{ $labels.pipeline_id }} avg latency is {{ $value | humanizeDuration }}ms.
            This is catastrophic for any synchronous downstream — page on-call.

  # ── 3) Liveness ──────────────────────────────────────────────────
  - name: mqconnector.liveness.alerts
    rules:
      - alert: mqConnectorScrapeFailed
        expr: up{job="mqconnector"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "mqConnector scrape failed"
          description: "Prometheus has been unable to scrape mqConnector for 5 minutes."

      - alert: mqConnectorPipelineDown
        # The pipeline executor sets status="error" when the source
        # broker connection drops or stages start failing. This fires
        # the moment the gauge dips to 0 for any pipeline and gives
        # the operator the offending broker via the labels.
        expr: mqconnector_pipeline_up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }} is down"
          description: |
            Pipeline {{ $labels.pipeline_id }} (source={{ $labels.source }} →
            dest={{ $labels.dest }}) reports status={{ $labels.status }}. Check
            broker connectivity and the recent logs for the cause.

      - alert: mqConnectorNoMessagesFlowing
        # Each running pipeline should process at least one message every
        # 15 minutes; an idle pipeline is suspicious. Tune via
        # `for:` if a pipeline is expected to be quiet for longer.
        expr: |
          rate(mqconnector_messages_processed_total[15m]) == 0
          and
          mqconnector_uptime_seconds > 900
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: no messages in 15m"
          description: |
            Pipeline {{ $labels.pipeline_id }} has processed zero messages for 15 minutes.
            Check the upstream broker and the pipeline status.

  # ── 4) Tail-latency SLOs (histogram-based) ───────────────────────
  # avg latency papers over outliers; p95/p99 catch the tail-
  # consumer pain that an SLA usually targets. Recording rules
  # below pre-compute the histogram quantile so dashboards and
  # alerts don't repeat the math.
  - name: mqconnector.latency.recording
    interval: 30s
    rules:
      - record: mqconnector:latency_ms:p95
        expr: |
          histogram_quantile(0.95,
            sum by (pipeline_id, le) (
              rate(mqconnector_pipeline_latency_ms_bucket[5m])
            )
          )
      - record: mqconnector:latency_ms:p99
        expr: |
          histogram_quantile(0.99,
            sum by (pipeline_id, le) (
              rate(mqconnector_pipeline_latency_ms_bucket[5m])
            )
          )

  - name: mqconnector.latency.tail.alerts
    rules:
      - alert: mqConnectorP95LatencyHigh
        expr: mqconnector:latency_ms:p95 > 1000
        for: 10m
        labels:
          severity: warning
          slo: latency_p95
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: p95 latency > 1s"
          description: |
            Pipeline {{ $labels.pipeline_id }} p95 end-to-end latency is
            {{ $value }}ms over the last 5m. Investigate stage cost,
            destination broker health, or pipeline workers count.

      - alert: mqConnectorP99LatencyHigh
        expr: mqconnector:latency_ms:p99 > 5000
        for: 5m
        labels:
          severity: critical
          slo: latency_p99
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: p99 latency > 5s"
          description: |
            One-in-a-hundred messages on pipeline {{ $labels.pipeline_id }} is
            spending > 5 seconds in the bridge. Downstream timeouts are likely
            already firing.

  # ── 5) Failure-rate burst ────────────────────────────────────────
  # The availability SLO above is the *budget* view. This one is the
  # "something just broke" pager — a sudden burst of failures over a
  # short window, regardless of the long-term budget. Triggers on
  # any pipeline where >25% of the last 1m's traffic failed.
  - name: mqconnector.failures.alerts
    rules:
      - alert: mqConnectorFailureBurst
        expr: |
          (
            rate(mqconnector_messages_failed_total[1m])
            /
            clamp_min(
              rate(mqconnector_messages_processed_total[1m])
              + rate(mqconnector_messages_failed_total[1m]),
              0.01
            )
          ) > 0.25
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: failure burst"
          description: |
            More than 25% of messages on pipeline {{ $labels.pipeline_id }} are
            failing right now. DLQ growth is imminent; check destination broker
            and any recent config change.

  # ── 6) DLQ growth (Phase 2 observability) ────────────────────────
  # mqconnector_dlq_depth and mqconnector_dlq_oldest_age_seconds are
  # rendered by the operational-metrics handler. Absence of the
  # series for a pipeline = "no DLQ rows" (the renderer skips
  # zero-count pipelines), so the alerts here naturally fire only
  # when there's actual backlog.
  - name: mqconnector.dlq.alerts
    rules:
      - alert: mqConnectorDLQGrowing
        expr: mqconnector_dlq_depth > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: DLQ depth > 100"
          description: |
            Pipeline {{ $labels.pipeline_id }} has {{ $value }} rows in the DLQ
            (held for 10m). A destination broker outage or a poison-message
            loop is likely. Review /api/v1/dlq and the recent logs.

      - alert: mqConnectorDLQStuck
        # Oldest row in the DLQ has aged past 1 hour — beyond the
        # reaper's exponential-backoff schedule for typical configs.
        # Manual triage required.
        expr: mqconnector_dlq_oldest_age_seconds > 3600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: stale DLQ rows"
          description: |
            DLQ on pipeline {{ $labels.pipeline_id }} has rows older than
            1 hour ({{ $value | humanizeDuration }}). The retry reaper has
            given up on them; a human needs to decide replay vs delete.

  # ── 7) Leadership / HA ───────────────────────────────────────────
  # mqconnector_leader carries a `mode` label: "single" for one-process
  # deploys (always 1), "ha" when the lease is enabled. We alert only
  # on the "ha" case — a single-process deploy is by definition the
  # leader of itself.
  - name: mqconnector.leadership.alerts
    rules:
      - alert: mqConnectorNoLeader
        # In a multi-replica deploy, exactly one replica must hold the
        # lease. Zero means lease lost and not yet recovered; > 1 is
        # split-brain (advisory lock prevents this on Postgres; SQLite
        # serialises writes so it's effectively impossible there too).
        expr: sum(mqconnector_leader{mode="ha"}) != 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "mqConnector leadership: {{ $value }} leaders (want 1)"
          description: |
            Expected exactly one leader for the HA replica set; observing
            {{ $value }}. Zero means the lease was lost; check kubelet
            evictions, DB connectivity, and clock skew. Greater than one
            is split-brain — escalate immediately.

      - alert: mqConnectorLeaderLeaseExpiringFast
        # The leader renews at lease_ttl / 2. Remaining seconds dropping
        # below ttl/4 means renewal is lagging — usually DB contention
        # or a paused process.
        expr: mqconnector_leader_lease_remaining_seconds{mode="ha"} < 5
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "mqConnector leader {{ $labels.self }}: lease nearly expired"
          description: |
            Leader {{ $labels.self }} on a 30s-TTL lease has only
            {{ $value }}s remaining. Investigate DB latency, GC pause
            durations, or noisy-neighbour effects on the host.

  # ── 8) Encryption at rest ────────────────────────────────────────
  - name: mqconnector.encryption.alerts
    rules:
      - alert: mqConnectorEncryptionDisabled
        # Phase 1 hardening: prod-mode binaries refuse to start without
        # a master key, so this alert firing means either (a) the bridge
        # is running in dev mode in production (config drift), or (b)
        # the key was rotated to nothing. Either way operator attention.
        expr: mqconnector_master_key_version == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "mqConnector connection encryption is disabled"
          description: |
            Master key version is 0 — broker passwords are stored in
            plaintext at rest. In prod, set MQC_MASTER_KEY (or
            MQC_MASTER_KEYS for rotation) and rotate via `mqconnector
            rotate-secrets`. See OPERATIONS.md.

  # ── 9) Source-side broker backlog (Phase 2 DepthReporter) ────────
  # Populated for source brokers that implement mq.DepthReporter
  # (RabbitMQ queue depth, Kafka consumer-group lag). Absence of the
  # series means the source type doesn't expose depth (MQTT QoS 0,
  # NATS Core) — that's fine, no alert fires.
  - name: mqconnector.source_depth.alerts
    rules:
      - alert: mqConnectorSourceBacklogGrowing
        expr: mqconnector_source_depth > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: source backlog > 10k"
          description: |
            Source backlog on pipeline {{ $labels.pipeline_id }} is at
            {{ $value }} messages and not draining over 10 minutes. The
            destination is slower than the source — bump
            pipelines.workers, raise max_msgs_per_minute, or scale the
            destination broker.

  # ── 10) Schema drift on the validate stage ──────────────────────
  # The validate stage runs once per message on pipelines that have a
  # schema attached (json_schema / xsd / protobuf). A sustained spike
  # in failure-rate is the canonical "upstream producer changed the
  # schema" signal — DLQ-depth alarms catch it eventually, but only
  # AFTER thousands of messages have been quarantined. This rule
  # fires earlier, on the inflection point itself.
  #
  # Guard: only fire when actual validate traffic exists (attempts
  # rate > 0.1/s). A pipeline that does no validation, or one that's
  # idle, can't drift.
  - name: mqconnector.schema_drift.recording
    interval: 30s
    rules:
      - record: mqconnector:validate_attempts:rate5m
        expr: sum by (pipeline_id) (rate(mqconnector_validate_attempts_total[5m]))
      - record: mqconnector:validate_failures:rate5m
        expr: sum by (pipeline_id) (rate(mqconnector_validate_failures_total[5m]))
      - record: mqconnector:validate_failure_ratio:rate5m
        expr: |
          mqconnector:validate_failures:rate5m
          /
          clamp_min(mqconnector:validate_attempts:rate5m, 0.001)

  - name: mqconnector.schema_drift.alerts
    rules:
      - alert: mqConnectorSchemaDriftSuspected
        expr: |
          mqconnector:validate_failure_ratio:rate5m > 0.20
          AND
          mqconnector:validate_attempts:rate5m > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: schema drift suspected ({{ $value | humanizePercentage }} validate failure)"
          description: |
            Validate-stage failure rate on pipeline
            {{ $labels.pipeline_id }} is {{ $value | humanizePercentage }}
            over the last 5 minutes (sustained 3 min), with
            attempts rate > 0.1/s.

            Likely cause: an upstream producer changed the payload
            schema (renamed/removed a required field, changed a type,
            etc.) and the pipeline's validate stage is now rejecting
            most messages. The rejections are landing in DLQ — query
            /api/v1/dlq?pipeline_id={{ $labels.pipeline_id }}&error=validate
            to see the failing payloads, then diff them against the
            schema referenced by the pipeline.

            If the schema change is intended, update the validate
            stage's schema_id (or the pipeline's SchemaID) to match.
            If it is not, contact the upstream producer team.

      - alert: mqConnectorSchemaDriftSevere
        expr: |
          mqconnector:validate_failure_ratio:rate5m > 0.80
          AND
          mqconnector:validate_attempts:rate5m > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "mqConnector pipeline {{ $labels.pipeline_id }}: validate is rejecting almost everything"
          description: |
            >80% of messages are failing the validate stage on
            {{ $labels.pipeline_id }}. The pipeline is effectively
            offline — every message is going to DLQ. Page on-call.
            See OPERATIONS.md / dlq-growing runbook.
