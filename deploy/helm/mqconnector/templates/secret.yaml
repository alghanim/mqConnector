{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mqconnector.secretName" . }}
  labels:
    {{- include "mqconnector.labels" . | nindent 4 }}
type: Opaque
stringData:
  SIMPLEAUTH_ADMIN_TOKEN: {{ .Values.secrets.data.simpleauthAdminToken | quote }}
  MQC_ENCRYPTION_KEY_V1: {{ .Values.secrets.data.encryptionKeyV1 | quote }}
{{- end }}
