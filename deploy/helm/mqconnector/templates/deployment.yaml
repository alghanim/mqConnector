apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mqconnector.fullname" . }}
  labels:
    {{- include "mqconnector.labels" . | nindent 4 }}
spec:
  # mqConnector elects a single leader to own pipeline execution; extra
  # replicas serve read-only UI traffic but the writer count never goes
  # above 1. For most installs a single replica is the right call.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "mqconnector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mqconnector.selectorLabels" . | nindent 8 }}
      annotations:
        # Re-deploy when the rendered config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: mqconnector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -config
            - /etc/mqconnector/config.yaml
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "mqconnector.secretName" . }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: https
              scheme: HTTPS
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: https
              scheme: HTTPS
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/mqconnector/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: tls
              mountPath: /etc/mqconnector/tls
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/mqconnector
            {{- end }}
            # readOnlyRootFilesystem is true, so /tmp needs an emptyDir
            # for stdlib temp files (e.g. JSON Schema validator caches).
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "mqconnector.fullname" . }}-config
        - name: tls
          secret:
            secretName: {{ include "mqconnector.tlsSecretName" . }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "mqconnector.fullname" . }}-data
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
