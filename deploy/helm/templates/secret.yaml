{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mqconnector.secretName" . }}
  labels: {{- include "mqconnector.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Master key for the envelope-encryption of stored MQ broker
  # passwords. 64 hex chars (= 32 bytes). For multi-version rotation
  # see secrets.masterKeys.
  MQC_MASTER_KEY: {{ .Values.secrets.masterKey | quote }}
  MQC_MASTER_KEYS: {{ .Values.secrets.masterKeys | quote }}
  AUTH_ADMIN_KEY: {{ .Values.secrets.simpleauthAdminKey | quote }}
{{- end }}
