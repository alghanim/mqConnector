# mqConnector configuration reference.
#
# Every value below can be overridden by an environment variable. The variable name is the
# fully-qualified config path uppercased with dots replaced by underscores. Example:
#   server.tls.enabled  →  SERVER_TLS_ENABLED
#   storage.dsn         →  STORAGE_DSN
#
# Production-mode requirements (server.mode = "prod", the default):
#   - TLS is mandatory (server.tls.enabled = true with valid cert / key paths).
#   - SimpleAuth URL is mandatory (auth.simpleauth_url).
#   - auth.insecure_skip_verify must be false.
#   - The MQC_MASTER_KEY (or MQC_MASTER_KEYS) env var MUST be set to a 32-byte
#     hex/base64 key. The binary refuses to start in prod mode without one;
#     broker passwords are encrypted at rest under this key. Generate once:
#       openssl rand -hex 32
#     and inject from your secret store (k8s Secret, systemd EnvironmentFile,
#     Vault Agent, etc.). Multi-version rotation form: MQC_MASTER_KEYS="v1=...,v2=..."

server:
  # Bind address. Default 0.0.0.0:8443 (TLS) or 0.0.0.0:8080 (dev).
  listen: "0.0.0.0:8443"

  # Server mode: "prod" (default) or "dev". Dev mode allows TLS to be disabled,
  # relaxes secure-cookie flags, and is intended for local development only.
  mode: "prod"

  # Request body size limit (bytes). Applies to all /api endpoints.
  max_body_bytes: 10485760  # 10 MB

  # Read / write / idle timeouts for the HTTP server.
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"

  # CORS — leave empty to disable. Otherwise, list explicit origins.
  cors_origins: []

  tls:
    # In prod mode, TLS is required. The server refuses to start otherwise.
    enabled: true
    cert_file: "./certs/server.crt"
    key_file: "./certs/server.key"
    # TLS minimum version. 1.2 or 1.3. Default 1.2.
    min_version: "1.2"

storage:
  # SQLite DSN. Use a path on a persistent volume in production.
  dsn: "file:./data/mqconnector.db?_pragma=journal_mode(WAL)&_pragma=busy_timeout(5000)&_pragma=foreign_keys(on)"
  # Max simultaneous open connections to SQLite. Keep low; SQLite is single-writer.
  max_open_conns: 8
  # Max idle connections held in pool.
  max_idle_conns: 4
  # In-process scheduled backup worker. Off by default — set dir to enable.
  # Snapshots use SQLite's online VACUUM INTO (no service interruption).
  # On multi-replica deploys only the leader writes; followers stay idle.
  # See OPERATIONS.md for the restore procedure.
  backup:
    dir: ""           # e.g. /var/backups/mqconnector
    interval: 24h     # how often to snapshot
    keep: 7           # keep the most recent N snapshots, prune older

auth:
  # SimpleAuth server URL (issues and validates JWTs). Required in prod mode.
  simpleauth_url: "https://auth.internal.example.com"
  # SimpleAuth admin API key — only needed if you call admin endpoints
  # (user/role management) from mqConnector. Leave empty for runtime-only auth.
  admin_key: ""
  # Skip TLS verification when calling SimpleAuth. Dev-only — rejected in prod.
  insecure_skip_verify: false
  # Browser session-cookie TTL. Should be ≤ the JWT's own expiry.
  session_ttl: "12h"
  # Sliding inactivity timeout. When set and less than session_ttl,
  # every authenticated request refreshes the cookie's MaxAge so an
  # idle browser tab auto-logs-out without server-side state.
  # Required by HIPAA / NIST 800-53 IA-11 / some PCI flows.
  # 0 disables; typical value 15-30 minutes.
  #
  # Production recommendation: 30m. Leaving this at 0s lets a forgotten
  # browser tab stay authenticated for the full session_ttl (12 h above),
  # which most enterprise SOC2/ISO 27001 controls won't accept.
  idle_timeout: "0s"
  # Session cookie name.
  cookie_name: "mqc_session"

logging:
  # debug, info, warn, error
  level: "info"
  # text or json. Production: json.
  format: "json"

mq:
  # Connection pool defaults.
  pool:
    # Idle eviction interval. Connections idle longer than this are disconnected.
    idle_timeout: "5m"
    # Connection health-check interval.
    health_interval: "30s"
    # Per-message receive buffer (bytes) for IBM MQ. Tune up for larger payloads.
    ibm_recv_buffer: 4194304  # 4 MB

pipeline:
  # Number of concurrent message-processing workers per pipeline. 1 = strict FIFO.
  workers_per_pipeline: 1
  # DLQ retry policy.
  dlq:
    max_retries: 3
    retry_backoff: "30s"

# Scriptable transform engine settings.
#
# NOTE: the actual per-stage timeout is configured on each `script` stage's
# JSON config (`stage_config.timeout_ms`), with a built-in default of
# 5 seconds (DefaultScriptTimeoutMs in internal/pipeline/stage.go). The
# global knob here is reserved for future use; today it has no effect.
# Leaving it in place so older configs don't error on parse.
script:
  timeout: "1s"

# Optional: active/standby coordination across replicas. When enabled,
# every replica points at the same SQLite database and races for a lease;
# only the lease holder runs pipeline workers (so source queues aren't
# double-consumed). The admin UI stays available on every replica
# regardless. See docs/OPERATIONS.md §7 for the full posture.
leadership:
  enabled: false
  # Stable identifier for this replica. Empty → hostname. Set explicitly
  # when running in k8s so each Pod identifies itself across restarts.
  id: ""
  # Lease lifetime. Half this is the renewal interval. Tune larger than
  # your worst pause budget (GC, fsync stalls) but small enough that
  # takeover after a crashed leader is bounded.
  ttl: "30s"

# Audit-log archival. When archive_dir is empty the archiver is a no-op
# (audit_log stays queryable via /api/v1/audit but grows unbounded). When
# set, the sweeper streams rows older than max_age into per-day JSONL
# files under archive_dir, fsyncs each, then prunes the rows from the
# live table. Downstream SIEMs should deduplicate on the row `id`.
audit:
  archive_dir: ""             # e.g. "/var/log/mqconnector/audit"
  max_age: "168h"             # archive rows older than 7 days
  sweep_interval: "1h"
  # Optional S3-compatible upload of rotated daily files. Leave all
  # fields empty for local-only archival (the air-gapped default).
  # When configured, each fully-written day's file is uploaded to
  # s3://<bucket>/<prefix><filename>. Compatible with AWS S3, MinIO,
  # R2, Wasabi, Backblaze B2.
  s3:
    endpoint: ""              # e.g. "https://s3.amazonaws.com" or "http://minio:9000"
    region: ""                # e.g. "us-east-1"
    bucket: ""                # destination bucket
    prefix: ""                # optional key prefix
    access_key: ""
    secret_key: ""
    delete_after_upload: false # keep local copy on disk after upload

# Envelope-encryption key source.
#
#   source: "env"   (default) — read MQC_MASTER_KEY / MQC_MASTER_KEYS
#                   from the process environment. No external keystore.
#   source: "file"  — read keys from secrets.file.path. Drop-in
#                   target for Vault Agent sidecar, k8s Secret mount,
#                   sealed-secrets, SOPS-decrypted artifacts.
#                   Format: bare 32-byte hex/base64 for a single v1
#                   key, OR one v{N}=hex per line for multi-version.
#                   Comments start with `#`.
#   source: "vault" — fetch from a HashiCorp Vault KV v2 secret.
#                   Bridge holds the key in memory; no per-message
#                   round trip. Rotation = `vault kv put ...` then
#                   POST /api/v1/secrets/rotate to re-read.
#
# Only one source is active at a time.
secrets:
  source: "env"
  file:
    path: ""                  # e.g. "/etc/mqconnector/master_keys"
  vault:
    address: ""               # e.g. "https://vault.local:8200"
    token: ""                 # or set VAULT_TOKEN env (token_env overrides)
    token_env: ""             # env var name to read token from (default VAULT_TOKEN)
    namespace: ""             # Vault Enterprise namespace header
    mount: "secret"           # KV v2 mount path
    path: "mqconnector/master" # KV v2 secret path
    ca_file: ""               # optional PEM CA bundle for Vault TLS
    insecure_skip_verify: false
    timeout: "10s"
