# docker-compose.yml — full local mqConnector stack.
#
# Brings up:
#   - mqconnector  : the bridge itself, with the embedded SvelteKit admin UI
#   - simpleauth   : the department's auth server (sibling project)
#   - rabbitmq     : an AMQP broker for hands-on testing
#   - kafka        : a KRaft-mode Kafka single-broker for hands-on testing
#   - certs-init   : one-shot helper that generates a self-signed dev cert
#
# Start: cp .env.example .env && docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f mqconnector
#
# Production note: this stack defaults to dev mode (auto-generated cert).
# For production, set MQC_MODE=prod in .env, mount real TLS material via
# MQC_TLS_CERT / MQC_TLS_KEY, and put the stack behind a proper reverse
# proxy. The compose file is intentionally a starting point, not a final
# deployment artefact — `scripts/build-dist.sh` produces a tarball + systemd
# unit for non-Docker deployments.

name: mqconnector

networks:
  mqc:
    driver: bridge

volumes:
  mqc-data:
  mqc-certs:
  simpleauth-data:
  rabbitmq-data:
  kafka-data:

services:
  # ---------------------------------------------------------------------------
  # certs-init — generates a self-signed cert into the shared mqc-certs volume
  # on first run. Exits immediately if a cert is already present.
  # ---------------------------------------------------------------------------
  certs-init:
    image: alpine:3.20
    # alpine/openssl uses `openssl` as its entrypoint, so a shell command
    # gets eaten as `openssl sh ...`. The plain alpine image with openssl
    # added at runtime keeps the script-as-CMD pattern working.
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        apk add --no-cache openssl >/dev/null
        if [ ! -f /certs/server.crt ] || [ ! -f /certs/server.key ]; then
          openssl req -x509 -newkey rsa:2048 -days 365 -nodes \
            -keyout /certs/server.key -out /certs/server.crt \
            -subj "/CN=mqconnector" \
            -addext "subjectAltName=DNS:mqconnector,DNS:localhost,IP:127.0.0.1"
          # 0644 on the key is loose, but this is a *dev* self-signed cert
          # read by a non-root container user. Production should mount real
          # TLS material owned by the mqconnector UID with 0400, not
          # generate it here.
          chmod 0644 /certs/server.crt /certs/server.key
          echo "Generated self-signed dev TLS cert."
        else
          echo "TLS cert already present, skipping."
        fi
    volumes:
      - mqc-certs:/certs
    restart: "no"

  # ---------------------------------------------------------------------------
  # SimpleAuth — JWT issuer + user store. Built from the sibling source tree.
  # ---------------------------------------------------------------------------
  simpleauth:
    build:
      context: ${SIMPLEAUTH_CONTEXT:-../SimpleAuth}
      dockerfile: Dockerfile
      args:
        VERSION: ${SIMPLEAUTH_VERSION:-docker}
    container_name: mqc-simpleauth
    restart: unless-stopped
    networks: [mqc]
    environment:
      AUTH_PORT: "8080"
      AUTH_DATA_DIR: /data
      AUTH_HOSTNAME: simpleauth
      # Explicit base path — SimpleAuth defaults this to "/sauth" so the
      # actual health endpoint is /sauth/health. Pinning it makes the URL
      # stable across SimpleAuth versions.
      AUTH_BASE_PATH: /sauth
      # Fixed admin key so the bootstrap container has something stable
      # to authenticate with. Override via .env in any non-dev deployment.
      AUTH_ADMIN_KEY: ${SIMPLEAUTH_ADMIN_KEY:-dev-admin-key-changeme}
      # Allow mqconnector to redirect-target itself.
      AUTH_REDIRECT_URIS: "https://localhost:8443/*,https://mqconnector:8443/*"
    volumes:
      - simpleauth-data:/data
    ports:
      - "${SIMPLEAUTH_HOST_PORT:-9443}:8080"
    # SimpleAuth terminates TLS itself on port 8080 with a self-signed cert
    # on first boot. The healthcheck has to disable cert verification.
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--spider", "-q", "https://localhost:8080/sauth/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # simpleauth-bootstrap — one-shot job that runs once SimpleAuth is healthy
  # and creates the initial admin user via its admin API. Idempotent: a 409
  # "username taken" response is treated as success so re-running the stack
  # doesn't fail.
  # ---------------------------------------------------------------------------
  simpleauth-bootstrap:
    image: alpine:3.20
    depends_on:
      simpleauth:
        condition: service_healthy
    networks: [mqc]
    environment:
      ADMIN_KEY: ${SIMPLEAUTH_ADMIN_KEY:-dev-admin-key-changeme}
      USERNAME: ${SIMPLEAUTH_ADMIN_USER:-admin}
      PASSWORD: ${SIMPLEAUTH_ADMIN_PASSWORD:-Changeme1!}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        apk add --no-cache curl >/dev/null
        echo "→ Creating SimpleAuth user '$$USERNAME'…"
        HTTP_CODE=$$(curl -ksS -o /tmp/resp -w "%{http_code}" \
          -X POST https://simpleauth:8080/sauth/api/admin/users \
          -H "Authorization: Bearer $$ADMIN_KEY" \
          -H "Content-Type: application/json" \
          -d "{\"username\":\"$$USERNAME\",\"password\":\"$$PASSWORD\",\"display_name\":\"mqConnector Admin\"}")
        case $$HTTP_CODE in
          201) echo "✓ user created" ;;
          409) echo "✓ user already exists, nothing to do" ;;
          *)
            echo "✗ unexpected status $$HTTP_CODE"
            cat /tmp/resp
            exit 1
            ;;
        esac
    restart: "no"

  # ---------------------------------------------------------------------------
  # mqConnector — the bridge.
  # ---------------------------------------------------------------------------
  mqconnector:
    build:
      context: .
      dockerfile: Dockerfile
      # BuildKit named context — exposes the sibling SimpleAuth SDK to the
      # Dockerfile under the name `simpleauth-sdk`. Override the path via
      # SIMPLEAUTH_SDK_PATH in .env if your layout differs.
      additional_contexts:
        simpleauth-sdk: ${SIMPLEAUTH_SDK_PATH:-../SimpleAuth/sdk/go}
      args:
        VERSION: ${MQC_VERSION:-1.0.0}
    container_name: mqc-app
    restart: unless-stopped
    networks: [mqc]
    depends_on:
      certs-init:
        condition: service_completed_successfully
      simpleauth:
        condition: service_healthy
      simpleauth-bootstrap:
        condition: service_completed_successfully
    environment:
      # Server
      SERVER_LISTEN: "0.0.0.0:8443"
      SERVER_MODE: ${MQC_MODE:-dev}
      SERVER_TLS_ENABLED: "true"
      SERVER_TLS_CERT_FILE: /etc/mqconnector/tls/server.crt
      SERVER_TLS_KEY_FILE:  /etc/mqconnector/tls/server.key
      # Storage
      STORAGE_DSN: "file:/var/lib/mqconnector/mqconnector.db?_pragma=journal_mode(WAL)&_pragma=busy_timeout(5000)&_pragma=foreign_keys(on)"
      # Auth — points at the simpleauth container by service DNS. SimpleAuth
      # terminates TLS with a self-signed cert on first boot, so we skip
      # verification on the internal network. In a hardened deployment,
      # replace the self-signed cert with a CA-issued one and flip
      # INSECURE_SKIP_VERIFY back to false.
      AUTH_SIMPLEAUTH_URL: "https://simpleauth:8080/sauth"
      AUTH_INSECURE_SKIP_VERIFY: "true"
      AUTH_SESSION_TTL: "12h"
      AUTH_COOKIE_NAME: mqc_session
      # Logging
      LOGGING_LEVEL: ${MQC_LOG_LEVEL:-info}
      LOGGING_FORMAT: ${MQC_LOG_FORMAT:-json}
      # OTLP/HTTP tracing — exports every Span.End() into Jaeger. Empty
      # OTLP_ENDPOINT disables export (tracing stays log-only).
      TRACING_OTLP_ENDPOINT: ${MQC_OTLP_ENDPOINT:-jaeger:4318}
      TRACING_INSECURE: "true"
      TRACING_SERVICE_NAME: mqconnector
      TRACING_SAMPLE_RATIO: "1.0"
      TZ: ${TZ:-UTC}
    volumes:
      - mqc-data:/var/lib/mqconnector
      - mqc-certs:/etc/mqconnector/tls:ro
    ports:
      - "${MQC_HOST_PORT:-8443}:8443"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate --spider -q https://localhost:8443/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # RabbitMQ — useful for local pipeline experiments.
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mqc-rabbitmq
    restart: unless-stopped
    networks: [mqc]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-mqc}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mqc-dev}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Kafka — single broker in KRaft mode (no Zookeeper).
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.0
    container_name: mqc-kafka
    restart: unless-stopped
    networks: [mqc]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_HOST_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-mqc-local-cluster}
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9094"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Jaeger all-in-one — OTLP/HTTP collector + tracing UI. Used by the
  # tracing.otlp_endpoint=jaeger:4318 wiring to verify end-to-end span
  # export. UI on http://localhost:16686/.
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: mqc-jaeger
    restart: unless-stopped
    networks: [mqc]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP/HTTP
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Confluent-compatible schema registry. The OSS apicurio image speaks
  # the same /subjects/* REST surface mqConnector's internal/schemaregistry
  # client expects. Used to verify the schema-registry integration.
  # ---------------------------------------------------------------------------
  schemaregistry:
    image: apicurio/apicurio-registry:3.0.6
    container_name: mqc-schemaregistry
    restart: unless-stopped
    networks: [mqc]
    environment:
      APICURIO_STORAGE_KIND: sql
      APICURIO_STORAGE_SQL_KIND: h2
    ports:
      - "8181:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
