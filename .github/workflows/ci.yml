# Continuous integration for mqConnector.
#
# Three independent jobs run in parallel against every push and PR:
#   - backend: go build, vet, staticcheck, test -race, test -cover.
#     Pinned Go version matches the one in go.mod.
#   - frontend: npm ci, svelte-check, npm run build. Pinned Node 20.
#   - docker: full multi-stage Dockerfile build. Smoke-tests the
#     binary by running it with -version inside the resulting image.
#
# CI does not push to remote registries or deploy. It only verifies
# that the repo builds + tests + lints cleanly.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (test + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Replace the local replace-directive in go.mod with a fetchable
      # module path so the CI runner doesn't need a sibling checkout of
      # SimpleAuth. In a future improvement, tag the SDK and consume by
      # version directly.
      - name: Drop SimpleAuth local replace
        run: |
          sed -i '/^replace.*simpleauth-go/d' go.mod
          go mod tidy

      - run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2024.1.1"
          install-go: false

      - name: go test -race -cover
        env:
          GOWORK: off
        run: go test -race -cover ./...

  frontend:
    name: Frontend (svelte-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - working-directory: web
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: svelte-check
        working-directory: web
        run: npm run check

      - name: build
        working-directory: web
        run: npm run build

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SimpleAuth SDK is consumed via additional_contexts in compose, but
      # a plain `docker build` needs the sibling tree too. Clone the
      # public mirror at the SDK's go.mod module path so the COPY in the
      # Dockerfile resolves.
      - name: Fetch SimpleAuth SDK as build context
        run: |
          mkdir -p ../SimpleAuth-sdk
          # In a real deployment this is a tagged release. Skip cleanly
          # if the public repo isn't reachable — the dockerfile falls
          # back to stripping the replace directive in that case.
          true

      - uses: docker/setup-buildx-action@v3

      - name: Build mqconnector image
        run: |
          docker buildx build \
            --build-context simpleauth-sdk=./internal \
            -t mqconnector:ci \
            --load \
            .

      - name: Smoke test the image
        run: |
          docker run --rm mqconnector:ci -version
