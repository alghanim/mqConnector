# Continuous integration for mqConnector.
#
# Three independent jobs run in parallel against every push and PR:
#   - backend: go build, vet, staticcheck, test -race, test -cover.
#     Pinned Go version matches the one in go.mod.
#   - frontend: npm ci, svelte-check, npm run build. Pinned Node 20.
#   - docker: full multi-stage Dockerfile build. Smoke-tests the
#     binary by running it with -version inside the resulting image.
#
# CI does not push to remote registries or deploy. It only verifies
# that the repo builds + tests + lints cleanly.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Pin Node.js 20-based actions onto the Node 24 runtime now. GitHub's
# default switches in June 2026 and removes Node 20 in September 2026;
# opting in early surfaces any incompatibility on our terms rather than
# during a freeze window.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend (test + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The replace directive in go.mod points at a sibling SimpleAuth
      # checkout that only exists on dev machines. Clone the public
      # mirror to a known path and rewrite the replace target to that
      # path so go mod can resolve simpleauth-go without hitting the
      # module proxy (which doesn't host this SDK — it lives in a
      # subdirectory of a larger repo).
      - name: Provide SimpleAuth SDK
        run: |
          git clone --depth 1 https://github.com/bodaay/SimpleAuth.git /tmp/SimpleAuth
          sed -i 's|=> ../SimpleAuth/sdk/go|=> /tmp/SimpleAuth/sdk/go|' go.mod
          go mod download

      - run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

      - name: go test -race -cover
        env:
          GOWORK: off
        run: go test -race -cover ./...

  frontend:
    name: Frontend (svelte-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - working-directory: web
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: svelte-check
        working-directory: web
        run: npm run check

      - name: vitest
        working-directory: web
        run: npm test

      - name: build
        working-directory: web
        run: npm run build

  integration:
    name: Integration (real brokers)
    runs-on: ubuntu-latest
    # Each broker has shipped with its own zero-test bug in the past
    # (Kafka partition-0 OffsetNewest, RabbitMQ at-most-once,
    # JetStream ack-timing) — running real brokers in CI is the only
    # path that catches them before prod.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Provide SimpleAuth SDK
        run: |
          git clone --depth 1 https://github.com/bodaay/SimpleAuth.git /tmp/SimpleAuth
          sed -i 's|=> ../SimpleAuth/sdk/go|=> /tmp/SimpleAuth/sdk/go|' go.mod
          go mod download

      - name: Bring brokers up
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for brokers healthy
        # `docker compose ps --format json` reports each service's
        # health; loop until all three are healthy or we hit the cap.
        run: |
          set -e
          deadline=$((SECONDS + 180))
          while [ $SECONDS -lt $deadline ]; do
            statuses=$(docker compose -f docker-compose.ci.yml ps --format '{{.Name}} {{.Health}}')
            echo "$statuses"
            if ! echo "$statuses" | grep -v 'healthy' | grep -q .; then
              echo "all brokers healthy"
              exit 0
            fi
            sleep 5
          done
          echo "brokers never reached healthy state"
          docker compose -f docker-compose.ci.yml logs --tail=200
          exit 1

      - name: go test -tags integration
        env:
          GOWORK: off
          RABBIT_URL: amqp://mqc:mqc-dev@localhost:5672
          KAFKA_BROKERS: localhost:9092
          NATS_URL: nats://localhost:4222
          NATS_STREAM: mqctest
        # The JetStream test self-bootstraps its stream via the Go
        # client, so CI doesn't need a pre-seed step.
        run: go test -tags integration -timeout 5m -count 1 ./...

      - name: Broker logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs --tail=300

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SimpleAuth SDK is consumed in development via additional_contexts
      # in docker-compose.yml; for the CI build we fetch the public mirror
      # and point the Dockerfile's `simpleauth-sdk` build-context at
      # `sdk/go` so the COPY + go.mod replace directive resolve cleanly.
      - name: Fetch SimpleAuth SDK
        run: |
          git clone --depth 1 https://github.com/bodaay/SimpleAuth.git /tmp/SimpleAuth
          test -f /tmp/SimpleAuth/sdk/go/go.mod

      - uses: docker/setup-buildx-action@v3

      - name: Build mqconnector image
        run: |
          docker buildx build \
            --build-context simpleauth-sdk=/tmp/SimpleAuth/sdk/go \
            -t mqconnector:ci \
            --load \
            .

      - name: Smoke test the image
        run: |
          docker run --rm mqconnector:ci -version
