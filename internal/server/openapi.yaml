# OpenAPI 3.0 specification for the mqConnector REST API.
#
# Source-of-truth for SDK generation and external API documentation. Kept
# hand-authored on purpose: adding swag (the swaggo annotation toolchain)
# would put a code generator in the build path for one mid-size YAML file,
# and the API surface is small enough that a manual spec is cheaper to
# maintain than the alternative.
#
# Tooling:
#   - validate locally: `npx @redocly/cli lint api/openapi.yaml`
#   - render docs:      `npx @redocly/cli build-docs api/openapi.yaml`
#   - regenerate SDKs:  `npx @openapitools/openapi-generator-cli generate -i api/openapi.yaml -g <lang> -o sdk/<lang>`
openapi: 3.0.3
info:
  title: mqConnector REST API
  description: |
    Admin and bridge API for mqConnector — a message-queue bridge between
    IBM MQ, RabbitMQ and Kafka with a pluggable processing pipeline.

    All `/api/v1/*` endpoints require a cookie-based session set by
    `POST /api/auth/login`. The session cookie is HttpOnly + SameSite=Strict;
    SDKs that target the API directly (rather than the embedded UI) should
    drive the same login flow and carry the cookie across requests.

    Mutations are recorded in the audit log; reads are not.
  version: 1.0.0
  license:
    name: Internal
servers:
  - url: https://localhost:8443
    description: Local dev (self-signed TLS)
  - url: https://mqconnector.internal
    description: Internal-network deployment

# -----------------------------------------------------------------------------
# Security
# -----------------------------------------------------------------------------
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: mqc_session
      description: HttpOnly cookie set by /api/auth/login.

  parameters:
    pathID:
      name: id
      in: path
      required: true
      description: Resource identifier (UUIDv4).
      schema:
        type: string
        format: uuid
    queryPage:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    queryPerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: not found

    Status:
      type: object
      properties:
        status:
          type: string
          example: ok

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }

    Me:
      type: object
      properties:
        sub: { type: string }
        preferred_username: { type: string }
        name: { type: string }
        email: { type: string }
        roles:
          type: array
          items: { type: string }

    Health:
      type: object
      required: [status, version, db_status, uptime, active_pipelines]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version: { type: string }
        db_status: { type: string }
        uptime: { type: string }
        active_pipelines: { type: integer }
        connections:
          type: array
          items:
            type: object
            properties:
              pipeline_id: { type: string }
              status: { type: string }
              last_error: { type: string }
              source_queue: { type: string }
              dest_queue: { type: string }

    Connection:
      type: object
      required: [name, type]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type:
          type: string
          description: |
            Broker family.
              * `ibm`      — IBM MQ via MQI (requires server build with -tags ibmmq)
              * `rabbitmq` — AMQP 0.9.1
              * `kafka`    — Kafka 3.x
              * `mqtt`     — MQTT 3.1 / 3.1.1 / 5
              * `nats`     — NATS or NATS JetStream (set `stream_name` to opt in)
              * `amqp10`   — OASIS AMQP 1.0 (ActiveMQ, Artemis, Solace, Azure SB)
          enum: [ibm, rabbitmq, kafka, mqtt, nats, amqp10]
        queue_manager:
          type: string
          description: "IBM MQ queue manager name."
        conn_name:
          type: string
          description: "host(port) — IBM MQ."
        channel:
          type: string
          description: "IBM MQ channel."
        username: { type: string }
        password:
          type: string
          format: password
          description: "AES-256-GCM-encrypted at rest with versioned keys (`secrets.encryption_keys`)."
        queue_name:
          type: string
          description: "IBM MQ / RabbitMQ destination queue."
        url:
          type: string
          description: |
            Endpoint URL.
              * RabbitMQ: `amqp://user:pass@host:5672/`
              * MQTT:     `tcp://host:1883/` or `ssl://host:8883/`
              * NATS:     `nats://host:4222/`
              * AMQP 1.0: `amqp://host:5672/` or `amqps://host:5671/`
        brokers:
          type: string
          description: "Kafka — comma-separated host:port list."
        topic:
          type: string
          description: "Kafka topic / MQTT topic / NATS subject."
        client_id:
          type: string
          description: "MQTT client id. Optional — auto-generated if omitted. Also used as the AMQP 1.0 container id."
        qos:
          type: integer
          minimum: 0
          maximum: 2
          description: "MQTT QoS level (0, 1, or 2). Default 0."
        stream_name:
          type: string
          description: "NATS JetStream stream name. Setting this opts into JetStream (PullSubscribe + Ack); leaving it empty uses core NATS (channel-buffered drain)."
        consumer_name:
          type: string
          description: "NATS JetStream durable consumer name. Required when `stream_name` is set."
        tls_ca_file:
          type: string
          description: "Path to a PEM CA bundle for broker TLS verification."
        tls_cert_file:
          type: string
          description: "Path to a PEM client certificate (mutual TLS)."
        tls_key_file:
          type: string
          description: "Path to the matching PEM private key."
        tls_insecure_skip_verify:
          type: boolean
          description: "Skip broker certificate verification. Dev-only — never set in prod."
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TestConnectionResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        elapsed_ms: { type: integer }
        error: { type: string }

    Pipeline:
      type: object
      required: [name, source_id, destination_id]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        source_id: { type: string, format: uuid }
        destination_id: { type: string, format: uuid }
        output_format:
          type: string
          description: |
            Wire format the pipeline should emit on the destination side.
            `same` is a no-op (preserves the source's detected format).
            `protobuf` requires the pipeline's translate stage to reference
            a schema row whose `schema_type` is `protobuf` and a
            `proto_message` FQN matching a message inside the descriptor set.
          enum: [same, json, xml, protobuf]
          default: same
        schema_id: { type: string, format: uuid, nullable: true }
        filter_paths:
          type: array
          items: { type: string }
        enabled: { type: boolean, default: true }
        workers: { type: integer, description: "Source-drain goroutine count; 0 means default 1." }
        retry_max: { type: integer, description: "Per-pipeline DLQ retry cap; 0 uses the service-wide default." }
        retry_backoff_ms: { type: integer, description: "Base backoff between DLQ retries in ms; 0 uses 5000." }
        max_msgs_per_minute: { type: integer, description: "Per-pipeline source-drain throughput cap; 0 = unlimited." }
        dedup_window_seconds:
          type: integer
          description: |
            Destination-side dedup window. When > 0, the executor SHA-256s
            the post-stage outbound payload and skips forwarding to the
            destination if an identical payload was seen on this pipeline
            within the last N seconds. The source is committed (treated as
            handled) so the broker doesn't redeliver. 0 = disabled (default,
            preserves the global at-least-once contract).
          default: 0
        shadow_destination_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Optional canary/shadow destination. When set together with
            shadow_percent > 0, the executor — after a successful prod
            send — ALSO publishes the same payload to this destination
            (sampled deterministically by payload hash). Failures on the
            shadow path are counted but never affect the prod
            commit-to-source decision. Used to rehearse broker migrations
            or validate a candidate consumer against real traffic.
        shadow_percent:
          type: integer
          description: |
            0-100. Fraction of post-stage payloads also forwarded to
            shadow_destination_id. 0 disables shadow even when the
            destination is configured.
          default: 0
          minimum: 0
          maximum: 100
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        effective_role:
          type: string
          enum: [viewer, operator, admin, owner]
          description: |
            Caller's resolved role for this pipeline: max(tenantRole, pipelineGrant).
            Returned only on list / get responses (additive); the UI uses it to
            gate edit and delete buttons. Absent on requests; ignored if
            present on writes.

    PipelineGrant:
      type: object
      required: [pipeline_id, user_sub, role]
      description: |
        Per-pipeline RBAC grant. Grants ESCALATE a user's tenant role for a
        specific pipeline — they never demote below the tenant role. See
        the access-control discussion in POSTGRES_MIGRATION.md / Phase 5.
      properties:
        pipeline_id: { type: string, format: uuid }
        user_sub: { type: string, description: SimpleAuth subject (sub claim). }
        role:
          type: string
          enum: [viewer, operator, admin, owner]
        created_at: { type: string, format: date-time }

    Stage:
      type: object
      required: [stage_order, stage_type]
      properties:
        id: { type: string, format: uuid }
        pipeline_id: { type: string, format: uuid }
        stage_order: { type: integer }
        stage_type:
          type: string
          enum: [filter, transform, translate, route, script, validate]
        stage_config:
          type: string
          description: "Stage-specific JSON config; shape depends on stage_type."
        enabled: { type: boolean }

    TransformRule:
      type: object
      required: [transform_type, source_path]
      properties:
        id: { type: string, format: uuid }
        pipeline_id: { type: string, format: uuid }
        transform_type:
          type: string
          enum: [rename, mask, move, set, delete]
        source_path: { type: string, description: "Dot-separated path inside the structured message." }
        target_path: { type: string }
        mask_pattern: { type: string, description: "Regex (Go RE2 syntax)." }
        mask_replace: { type: string }
        set_value: { type: string }
        order: { type: integer }

    RoutingRule:
      type: object
      required: [condition_operator, destination_id]
      properties:
        id: { type: string, format: uuid }
        pipeline_id: { type: string, format: uuid }
        condition_path: { type: string }
        condition_operator:
          type: string
          enum: [eq, neq, contains, regex, gt, lt, exists]
        condition_value: { type: string }
        destination_id: { type: string, format: uuid }
        priority: { type: integer }
        enabled: { type: boolean }

    Script:
      type: object
      required: [name, body]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        body: { type: string, description: "Line-oriented script grammar — see CLAUDE.md." }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Schema:
      type: object
      required: [name, schema_type, content]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        schema_type:
          type: string
          description: |
            `json_schema` — Draft-07 JSON Schema (UTF-8 JSON text in `content`).
            `xsd`         — XML Schema document (UTF-8 XML text in `content`).
            `protobuf`    — base64-encoded `FileDescriptorSet`
                            (output of `protoc --descriptor_set_out=`).
                            The corresponding ValidateStage / TranslateStage
                            must also carry a `proto_message` FQN.
          enum: [json_schema, xsd, protobuf]
        content: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    DLQEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        pipeline_id: { type: string, format: uuid }
        source_queue: { type: string }
        original_msg:
          type: string
          format: byte
          description: |
            Base64-encoded payload. When `redacted` is true, this is
            the post-redaction form; the unmodified bytes live in
            raw_msg (sealed) and are only retrievable via
            GET /api/v1/dlq/{id}/raw.
        redacted:
          type: boolean
          description: True when the payload was rewritten by the pipeline's redaction rules at Push time.
        error_reason: { type: string }
        retry_count: { type: integer }
        last_retry_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    DLQDiffSide:
      type: object
      required: [id, pipeline_id, created_at, error_reason, fingerprint, template, body, format]
      properties:
        id:           { type: string, format: uuid }
        pipeline_id:  { type: string, format: uuid }
        created_at:   { type: string, format: date-time }
        error_reason: { type: string }
        fingerprint:  { type: string }
        template:     { type: string }
        body:         { type: string }
        format:
          type: string
          description: Best-effort format guess. One of json | xml | text.
          enum: [json, xml, text]

    DLQRedactionRule:
      type: object
      required: [rule_kind, pattern]
      properties:
        id: { type: string, format: uuid }
        pipeline_id: { type: string, format: uuid }
        rule_kind:
          type: string
          enum: [jsonpath, regex]
          description: |
            jsonpath: dot/bracket path against a JSON payload; the
            matched value is replaced with mask_replace. Non-JSON
            payloads skip the rule cleanly.
            regex: Go regexp; every match is replaced with
            mask_replace via ReplaceAll on a byte view of the payload.
        pattern: { type: string }
        mask_replace: { type: string, default: "[REDACTED]" }
        order: { type: integer, description: "Application order; lower runs first." }
        enabled: { type: boolean, default: true }
        created_at: { type: string, format: date-time }

    AuditEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        at: { type: string, format: date-time }
        actor: { type: string }
        actor_sub: { type: string }
        action: { type: string, description: "HTTP verb of the mutating request." }
        resource: { type: string }
        status: { type: integer }
        request_id: { type: string }
        remote_ip: { type: string }

    PageEnvelope:
      type: object
      properties:
        page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }

    Tenant:
      type: object
      required: [slug, name]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string, description: "URL-safe handle. Unique." }
        name: { type: string }
        status:
          type: string
          enum: [active, suspended, disabled]
          default: active
        max_pipelines: { type: integer, description: "0 = unlimited" }
        max_msgs_per_minute: { type: integer, description: "0 = unlimited" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Role:
      type: string
      enum: [viewer, operator, admin, owner]
      description: |
        Tenant-scoped role. Order weakest→strongest:
        viewer < operator < admin < owner.

    Membership:
      type: object
      required: [tenant_id, user_sub, role]
      properties:
        tenant_id: { type: string, format: uuid }
        user_sub: { type: string, description: "JWT sub" }
        username: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TenantMembership:
      type: object
      description: "What GET /api/v1/tenants returns — pairs a tenant with the caller's role."
      properties:
        tenant: { $ref: '#/components/schemas/Tenant' }
        role: { $ref: '#/components/schemas/Role' }
        is_active: { type: boolean, description: "True for the caller's active tenant." }

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
paths:
  /api/health:
    get:
      summary: Liveness + readiness probe.
      tags: [system]
      security: []
      responses:
        '200':
          description: Healthy (or degraded — body carries detail).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
        '503':
          description: Unhealthy (e.g. database unreachable).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /api/metrics:
    get:
      summary: JSON metrics snapshot.
      tags: [system]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Per-pipeline counters + uptime.

  /api/metrics/prometheus:
    get:
      summary: Prometheus text-exposition format.
      tags: [system]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Prometheus metrics.
          content:
            text/plain: {}

  /api/auth/login:
    post:
      summary: Exchange username + password for a session cookie.
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Session cookie set in response.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Per-IP rate limit exceeded.
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds until next attempt.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/auth/refresh:
    post:
      summary: Exchange the refresh cookie for a fresh access/refresh pair.
      tags: [auth]
      security: []
      responses:
        '200':
          description: New cookies set.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
        '401':
          description: No refresh cookie or refresh rejected.

  /api/auth/logout:
    post:
      summary: Clear the session and refresh cookies.
      tags: [auth]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Cookies cleared.

  /api/auth/me:
    get:
      summary: Current user information.
      tags: [auth]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: User claims from the verified JWT.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Me' }
        '401':
          description: No valid session.

  /api/v1/connections:
    get:
      summary: List MQ connections.
      tags: [connections]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: All connections.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Connection' }
    post:
      summary: Create a connection.
      tags: [connections]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Connection' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Connection' }

  /api/v1/connections/{id}:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      summary: Get a connection by ID.
      tags: [connections]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Connection.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Connection' }
        '404':
          description: Not found.
    put:
      summary: Replace a connection.
      tags: [connections]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Connection' }
      responses:
        '200':
          description: Updated.
        '404':
          description: Not found.
    delete:
      summary: Delete a connection.
      tags: [connections]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Deleted.

  /api/v1/connections/{id}/test:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    post:
      summary: Probe a stored connection without saving.
      tags: [connections]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                queue: { type: string }
                topic: { type: string }
      responses:
        '200':
          description: Probe result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TestConnectionResponse' }
        '404':
          description: Connection not found.

  /api/v1/pipelines:
    get:
      summary: List pipelines.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: All pipelines.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Pipeline' }
    post:
      summary: Create a pipeline.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Pipeline' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Pipeline' }

  /api/v1/pipelines/{id}:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      summary: Get a pipeline.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Pipeline.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Pipeline' }
    put:
      summary: Replace a pipeline.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Pipeline' }
      responses:
        '200':
          description: Updated.
    delete:
      summary: Delete a pipeline.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Deleted.

  /api/v1/pipelines/{id}/stages:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      summary: List stages for a pipeline.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Stages.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Stage' }
    put:
      summary: Replace all stages for a pipeline.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/Stage' }
      responses:
        '200':
          description: Replaced.

  /api/v1/pipelines/{id}/transforms:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      summary: List transform rules.
      responses:
        '200':
          description: Transform rules.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TransformRule' }
    put:
      summary: Replace transform rules.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/TransformRule' }
      responses:
        '200':
          description: Replaced.

  /api/v1/pipelines/{id}/routing-rules:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      summary: List routing rules.
      responses:
        '200':
          description: Routing rules.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RoutingRule' }
    put:
      summary: Replace routing rules.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/RoutingRule' }
      responses:
        '200':
          description: Replaced.

  /api/v1/pipelines/{id}/revisions:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      summary: List pipeline revisions, newest-first.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 25 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Revisions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  revisions:
                    type: array
                    items: { type: object }
                  total:  { type: integer }
                  limit:  { type: integer }
                  offset: { type: integer }
        '404': { description: Pipeline not found. }

  /api/v1/pipelines/{id}/revisions/current:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      summary: Get the latest deployed revision for this pipeline.
      responses:
        '200':
          description: Latest deployed revision.
          content:
            application/json:
              schema: { type: object }
        '404': { description: Pipeline not found or no deployed revision. }

  /api/v1/pipelines/{id}/revisions/{rev}:
    parameters:
      - { $ref: '#/components/parameters/pathID' }
      - in: path
        name: rev
        required: true
        schema: { type: integer, minimum: 1 }
        description: Revision number assigned at save time.
    get:
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      summary: Get one pipeline revision by revision number.
      responses:
        '200':
          description: Revision.
          content:
            application/json:
              schema: { type: object }
        '400': { description: Revision number must be a positive integer. }
        '404': { description: Pipeline or revision not found. }

  /api/v1/pipelines/{id}/revisions/{rev}/diff:
    parameters:
      - { $ref: '#/components/parameters/pathID' }
      - in: path
        name: rev
        required: true
        schema: { type: integer, minimum: 1 }
        description: Baseline revision number (the "from" side of the diff).
    get:
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      summary: Diff two pipeline revisions (positional, structural).
      description: |
        Returns a structured diff describing what would change if the
        operator moved FROM `rev` TO `against`. Used by the Pipeline
        Studio diff viewer for both rollback previews
        (rev=current, against=older) and forward-deploy previews
        (rev=current, against=newer draft).

        Child rows (stages, transforms, routing rules) are matched
        positionally by their executor-visible ordering field
        (stage_order, order, priority). This is pragmatic: the legacy
        "replace all children" save path regenerates row UUIDs on
        every PUT, so identity-based matching can't survive a save.
        Pipeline scalar fields are diffed by JSON tag with
        created_at / updated_at excluded.
      parameters:
        - in: query
          name: against
          required: true
          schema: { type: integer, minimum: 1 }
          description: Target revision number (the "to" side of the diff).
      responses:
        '200':
          description: Structured diff.
          content:
            application/json:
              schema:
                type: object
                required: [from, to, diff]
                properties:
                  from:
                    type: integer
                    description: "Echo of {rev} — the baseline."
                  to:
                    type: integer
                    description: "Echo of against — the target."
                  diff:
                    type: object
                    properties:
                      pipeline_fields:
                        type: array
                        items:
                          type: object
                          properties:
                            path:   { type: string }
                            before: {}
                            after:  {}
                      stages:        { type: object }
                      transforms:    { type: object }
                      routing_rules: { type: object }
                      schema_version:
                        type: object
                        nullable: true
        '400': { description: Revision number must be a positive integer, or against query parameter missing. }
        '404': { description: Pipeline or either revision not found. }

  /api/v1/pipelines/{id}/revisions/{rev}/rollback:
    parameters:
      - { $ref: '#/components/parameters/pathID' }
      - in: path
        name: rev
        required: true
        schema: { type: integer, minimum: 1 }
        description: Revision number to roll back to.
    post:
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      summary: Roll back the pipeline's live configuration to a prior revision.
      description: |
        Creates a NEW revision whose snapshot equals revision {rev}'s
        snapshot, writes it through to the live pipelines / stages /
        transforms / routing_rules tables under one transaction, marks
        the new revision deployed, and hot-reloads the pipeline manager.

        Requires operator role on the pipeline (per-pipeline gate;
        honours grants).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                change_summary:
                  type: string
                  description: |
                    Free-text summary for the new revision row. Defaults
                    to "Rollback to revision N" when absent or empty.
      responses:
        '200':
          description: |
            Rollback applied. Response is the newly-created revision's
            metadata fields flat at the top level (revision_number,
            deployed_at, author_sub, change_summary, etc.) plus a
            `snapshot` field carrying the decoded PipelineSnapshot —
            same shape as GET /revisions/{rev}.
          content:
            application/json:
              schema:
                type: object
                required: [snapshot]
                properties:
                  snapshot: { type: object }
        '400': { description: Revision number must be a positive integer, or body malformed. }
        '403': { description: Caller lacks operator role on this pipeline. }
        '404': { description: Pipeline not in tenant, or revision not found. }
        '500': { description: Transactional write-through failed; live tables untouched. }

  /api/v1/pipelines/{id}/deploy:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    post:
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      summary: Promote an existing revision to live.
      description: |
        Loads the named revision, writes its snapshot through to the
        live pipelines / stages / transforms / routing_rules tables
        under one transaction, marks the EXISTING revision deployed
        (no new revision row is created — that distinguishes /deploy
        from /rollback), and hot-reloads the pipeline manager.

        When the pipeline's requires_approval flag is true, the
        request body MUST carry a non-empty `approver` field or the
        request is rejected 409. The flag defaults false and has no
        Wave-1 UI to flip it; the gate is implemented now so a later
        wave can flip the flag without server changes.

        Requires operator role on the pipeline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [revision_number]
              properties:
                revision_number:
                  type: integer
                  minimum: 1
                  description: Revision to promote to live.
                change_summary:
                  type: string
                  description: Free-text deploy note; recorded on the audit row.
                approver:
                  type: string
                  description: |
                    Required when the pipeline has requires_approval=true;
                    optional (and ignored) otherwise.
      responses:
        '200':
          description: |
            Deploy applied. Response is the now-deployed revision's
            metadata fields flat at the top level (revision_number,
            deployed_at, author_sub, change_summary, etc.) plus a
            `snapshot` field carrying the decoded PipelineSnapshot —
            same shape as GET /revisions/{rev}.
          content:
            application/json:
              schema:
                type: object
                required: [snapshot]
                properties:
                  snapshot: { type: object }
        '400': { description: Body malformed or revision_number missing/invalid. }
        '403': { description: Caller lacks operator role on this pipeline. }
        '404': { description: Pipeline not in tenant, or revision_number doesn't exist. }
        '409': { description: Pipeline requires approval and `approver` field is missing. }
        '500': { description: Transactional write-through failed; live tables untouched. }

  /api/v1/pipelines/{id}/grants:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      summary: List per-pipeline RBAC grants. Requires effective role >= admin on the pipeline.
      responses:
        '200':
          description: Grants for this pipeline.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PipelineGrant' }
        '403': { description: Forbidden. }
  /api/v1/pipelines/{id}/grants/{userSub}:
    parameters:
      - { $ref: '#/components/parameters/pathID' }
      - in: path
        name: userSub
        required: true
        schema: { type: string }
        description: SimpleAuth subject (sub claim) of the user being granted access.
    put:
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      summary: Grant or update a user's role on this pipeline. Grants escalate the tenant role; they never demote.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [viewer, operator, admin, owner]
      responses:
        '200':
          description: Grant created or updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PipelineGrant' }
        '400': { description: Invalid role or missing user_sub. }
        '403': { description: Forbidden. }
    delete:
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      summary: Revoke a user's grant on this pipeline.
      responses:
        '200': { description: Revoked. }
        '404': { description: Grant not found. }
        '403': { description: Forbidden. }

  /api/v1/reload:
    post:
      summary: Hot-reload every enabled pipeline from storage.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Reloaded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  started: { type: integer }

  /api/v1/dlq:
    get:
      summary: List dead-letter entries, with optional filters.
      tags: [dlq]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/queryPage'
        - $ref: '#/components/parameters/queryPerPage'
        - in: query
          name: pipeline_id
          description: Exact pipeline ID match.
          schema: { type: string, format: uuid }
        - in: query
          name: error
          description: Case-insensitive substring match on error_reason.
          schema: { type: string }
        - in: query
          name: since
          description: RFC3339 lower bound on created_at (inclusive).
          schema: { type: string, format: date-time }
        - in: query
          name: until
          description: RFC3339 upper bound on created_at (exclusive).
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Paginated DLQ entries.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageEnvelope'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/DLQEntry' }

  /api/v1/dlq/{id}/retry:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    post:
      summary: Re-publish a dead-letter message to the pipeline's destination.
      tags: [dlq]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Retried; the destination accepted the message.
        '400':
          description: Max retries exceeded.
        '404':
          description: DLQ entry not found.

  /api/v1/dlq/{id}:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    delete:
      summary: Permanently remove a DLQ entry.
      tags: [dlq]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Deleted.

  /api/v1/dlq/groups:
    get:
      summary: Aggregate DLQ rows by error-reason prefix (top-N).
      description: |
        Returns the top error patterns observed in the DLQ table for the
        active tenant, sorted by count descending. Each entry carries
        the leading characters of the error_reason (sufficient to
        identify the failure family), the row count, and the
        timestamp of the oldest row in the bucket.
      tags: [dlq]
      security: [{ sessionCookie: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Top error patterns.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        pattern:  { type: string }
                        count:    { type: integer }
                        oldest_at: { type: string, format: date-time }

  /api/v1/dlq/bulk/retry:
    post:
      summary: Bulk-retry every DLQ row matching a filter.
      description: |
        Operator-only. Replays every row that matches the supplied
        filter (same shape as GET /api/v1/dlq), capped at `max_rows`
        (default 100). Each row goes through the standard Retry path
        — rows past their retry budget land in the `failures` map
        rather than the destination.

        Filter fields can be supplied either as query parameters or
        as a JSON body. JSON-body fields override query parameters.
      tags: [dlq]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                pipeline_id: { type: string, format: uuid }
                error:       { type: string }
                since:       { type: string, format: date-time }
                until:       { type: string, format: date-time }
                max_rows:    { type: integer, default: 100 }
      responses:
        '200':
          description: Per-row outcome summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded: { type: integer }
                  failed:    { type: integer }
                  failures:
                    type: object
                    additionalProperties: { type: string }

  /api/v1/dlq/bulk/delete:
    post:
      summary: Bulk-delete every DLQ row matching a filter.
      description: |
        Operator-only. Removes every row matching the filter, capped
        at `max_rows` (default 1000). Same filter shape as the list
        endpoint; same body/query-param handling as bulk/retry.
      tags: [dlq]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                pipeline_id: { type: string, format: uuid }
                error:       { type: string }
                since:       { type: string, format: date-time }
                until:       { type: string, format: date-time }
                max_rows:    { type: integer, default: 1000 }
      responses:
        '200':
          description: Count of rows deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded: { type: integer }

  /api/v1/dlq/clusters:
    get:
      summary: Roll up DLQ entries into error-fingerprint clusters.
      description: |
        DLQ Intelligence Console rollup. Aggregates the tenant's DLQ
        entries by `error_fingerprint` (a SimHash over the tokenised
        error template) and returns the top-N clusters sorted by row
        count descending. Each cluster carries the canonical template,
        first/last-seen timestamps, distinct affected pipelines and
        failing stage names, a representative entry id (oldest in the
        cluster), and the 5 most-recent entry ids.

        Empty-fingerprint rows (legacy entries written before
        migration 0023, plus send-side failures with no stage
        attribution) are excluded — they remain reachable via the
        regular list endpoint.
      tags: [dlq]
      security: [{ sessionCookie: [] }]
      parameters:
        - in: query
          name: pipeline_id
          description: Exact pipeline ID match.
          schema: { type: string, format: uuid }
        - in: query
          name: since
          description: RFC3339 lower bound on created_at.
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          description: Max clusters to return (default 50, hard cap 200).
          schema: { type: integer, default: 50, maximum: 200 }
        - in: query
          name: min_count
          description: Exclude clusters with fewer than N entries (default 1).
          schema: { type: integer, default: 1 }
        - in: query
          name: ai
          description: |
            Opt-in AI enrichment. When set to `names` AND the AI
            subsystem is enabled with the `dlq_cluster_naming`
            capability allowed, each of the first 10 clusters is
            named/summarised/suggested by the configured LLM
            provider; the bundle lands in `ai_name` with
            `ai_source="ai"`. On any provider failure the cluster
            gets `ai_source="deterministic"` and the UI renders the
            template as the title. Absent / AI disabled: the
            `ai_name` and `ai_source` fields are omitted.
          schema: { type: string, enum: [names] }
      responses:
        '200':
          description: Ranked clusters.
          content:
            application/json:
              schema:
                type: object
                required: [generated_at, total, returned, clusters]
                properties:
                  generated_at: { type: string, format: date-time }
                  total:        { type: integer }
                  returned:     { type: integer }
                  clusters:
                    type: array
                    items:
                      type: object
                      required: [fingerprint, template, count, first_seen, last_seen, pipelines_affected, failing_stages, representative_id, recent_ids]
                      properties:
                        fingerprint:        { type: string }
                        template:           { type: string }
                        count:              { type: integer }
                        first_seen:         { type: string, format: date-time }
                        last_seen:          { type: string, format: date-time }
                        pipelines_affected:
                          type: array
                          items: { type: string }
                        failing_stages:
                          type: array
                          items: { type: string }
                        representative_id:  { type: string }
                        recent_ids:
                          type: array
                          items: { type: string }
                        ai_name:
                          description: |
                            LLM-generated cluster name + summary +
                            next-action suggestion. Present only
                            when `?ai=names` was requested and the
                            provider returned successfully.
                          type: object
                          required: [title, summary, suggestion]
                          properties:
                            title:      { type: string, maxLength: 80 }
                            summary:    { type: string, maxLength: 240 }
                            suggestion: { type: string, maxLength: 200 }
                        ai_source:
                          description: |
                            Source of the cluster's name surface.
                            `"ai"` when the LLM answered;
                            `"deterministic"` when the provider
                            failed and the UI should render the
                            template as the title. Absent when
                            `?ai=names` was not requested.
                          type: string
                          enum: [ai, deterministic]

  /api/v1/dlq/{id}/replay-sim:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    post:
      summary: Preview a DLQ retry against the live deployed revision.
      description: |
        Operator-only. Re-runs the entry's original payload through the
        pipeline's currently-deployed revision in preview mode — no
        broker sends, no DB mutation. Returns the per-stage observation
        log so the operator can see exactly where the message would
        fail today (or whether a fix has landed and a retry would now
        succeed).

        Uses `OriginalMsg` even for redacted rows; admin-only access to
        the sealed raw payload is a separate endpoint and not part of
        the simulation path.
      tags: [dlq]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Simulation result (would_succeed=false also returns 200).
          content:
            application/json:
              schema:
                type: object
                required: [entry_id, pipeline_id, revision_number, would_succeed, stage_runs]
                properties:
                  entry_id:        { type: string }
                  pipeline_id:     { type: string }
                  revision_number: { type: integer }
                  would_succeed:   { type: boolean }
                  stage_runs:
                    type: array
                    items:
                      type: object
                      required: [name, duration_ns, failed]
                      properties:
                        name:        { type: string }
                        duration_ns: { type: integer, format: int64 }
                        failed:      { type: boolean }
                        body:        { type: string }
                        format:      { type: string }
                        err:         { type: string }
                  final_output:  { type: string }
                  format:        { type: string }
                  error:         { type: string }
                  failing_stage: { type: string }
        '403':
          description: Caller lacks operator role on the entry's pipeline.
        '404':
          description: DLQ entry not found, or entry carries no pipeline_id.
        '409':
          description: Pipeline has no deployed revision; cannot simulate.

  /api/v1/dlq/{id}/diff:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      summary: Side-by-side payload diff between two DLQ entries.
      description: |
        Returns the line-level edit script transforming the `{id}`
        entry's payload into the `against=` entry's payload, along
        with metadata (pipeline, error_reason, fingerprint, template,
        format guess) for both sides. The line diff is an ordered
        flat list of `{op, text}` operations where `op` is one of
        `eq` | `add` | `del`.

        Passing the same id as `against` is allowed and yields an
        all-`eq` diff.
      tags: [dlq]
      security: [{ sessionCookie: [] }]
      parameters:
        - in: query
          name: against
          required: true
          description: The other DLQ entry id to diff against.
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Payload diff.
          content:
            application/json:
              schema:
                type: object
                required: [from, to, diff]
                properties:
                  from: { $ref: '#/components/schemas/DLQDiffSide' }
                  to:   { $ref: '#/components/schemas/DLQDiffSide' }
                  diff:
                    type: array
                    items:
                      type: object
                      required: [op, text]
                      properties:
                        op:   { type: string, enum: [eq, add, del] }
                        text: { type: string }
        '400':
          description: Missing required `against` query parameter.
        '404':
          description: Either DLQ entry not found.

  /api/v1/dlq/{id}/raw:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      summary: Read the unredacted payload of a redacted DLQ entry.
      description: |
        Admin-only. Returns the pre-redaction bytes for a row whose
        payload was masked at Push time by the pipeline's
        dlq_redaction_rules. Every successful read is recorded in
        the audit log under action="dlq_raw_view".

        Responds with 204 No Content when the row exists but was
        never redacted (callers should display the OriginalMsg from
        the list endpoint directly). 503 when the row is redacted
        but the master key is no longer configured.
      tags: [dlq]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Unredacted payload bytes.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '204':
          description: Row was not redacted; nothing to disclose beyond the list payload.
        '404':
          description: DLQ entry not found.
        '503':
          description: Sealer not configured; raw payload cannot be decrypted.

  /api/v1/pipelines/{id}/dlq-redaction-rules:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      summary: List the DLQ redaction rules attached to a pipeline.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Ordered rule set.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/DLQRedactionRule' }
    put:
      summary: Replace the DLQ redaction rules attached to a pipeline.
      description: |
        Admin-only. Each rule is validated up-front (regex compile,
        jsonpath syntax). Refused with 412 when no master key is
        configured — redaction without sealed raw storage is a
        compliance hazard rather than a feature, so the API forces
        the encryption posture before rules can be saved.
      tags: [pipelines]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items: { $ref: '#/components/schemas/DLQRedactionRule' }
      responses:
        '200':
          description: Rules saved.
        '400':
          description: Malformed rule (bad pattern, unknown rule_kind, etc).
        '404':
          description: Pipeline not found.
        '412':
          description: Master key not configured.

  /api/v1/scripts:
    get:
      tags: [scripts]
      summary: List scripts.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Scripts.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Script' }
    post:
      tags: [scripts]
      summary: Create a script.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Script' }
      responses:
        '201':
          description: Created.

  /api/v1/scripts/{id}:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      tags: [scripts]
      summary: Get a script.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Script.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Script' }
    put:
      tags: [scripts]
      summary: Replace a script.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Script' }
      responses:
        '200':
          description: Updated.
    delete:
      tags: [scripts]
      summary: Delete a script.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Deleted.

  /api/v1/schemas:
    get:
      tags: [schemas]
      summary: List validation schemas.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Schemas.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Schema' }
    post:
      tags: [schemas]
      summary: Create a validation schema.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Schema' }
      responses:
        '201':
          description: Created.

  /api/v1/schemas/{id}:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      tags: [schemas]
      summary: Get a schema.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Schema.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Schema' }
    put:
      tags: [schemas]
      summary: Replace a schema.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Schema' }
      responses:
        '200':
          description: Updated.
    delete:
      tags: [schemas]
      summary: Delete a schema.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Deleted.

  /api/v1/audit:
    get:
      tags: [audit]
      summary: List audit log entries.
      security: [{ sessionCookie: [] }]
      parameters:
        - { in: query, name: actor, schema: { type: string } }
        - { in: query, name: resource, schema: { type: string } }
        - { in: query, name: since, schema: { type: string, format: date-time } }
        - { in: query, name: until, schema: { type: string, format: date-time } }
        - $ref: '#/components/parameters/queryPage'
        - $ref: '#/components/parameters/queryPerPage'
      responses:
        '200':
          description: Audit entries newest-first.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageEnvelope'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/AuditEntry' }

  /api/v1/tenants:
    get:
      tags: [tenants]
      summary: List the caller's own tenant memberships.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Memberships.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/TenantMembership' }
    post:
      tags: [tenants]
      summary: Create a new tenant. System-admin only.
      description: |
        Only the owner of the seeded "default" tenant can create new
        tenants. The creator is auto-added as owner of the new tenant.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Tenant' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        '403':
          description: Caller is not the system admin.

  /api/v1/tenants/{id}:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      tags: [tenants]
      summary: Get a tenant. Caller must be a member.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Tenant.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        '404':
          description: Not found or caller is not a member.
    put:
      tags: [tenants]
      summary: Update a tenant. Owner only.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Tenant' }
      responses:
        '200': { description: Updated. }
        '403': { description: Caller is not an owner of this tenant. }
    delete:
      tags: [tenants]
      summary: Delete a tenant. Owner only. Refuses the default tenant.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Deleted. }
        '400': { description: Refused (e.g. attempting to delete the default tenant). }
        '403': { description: Caller is not an owner. }

  /api/v1/tenants/{id}/switch:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    post:
      tags: [tenants]
      summary: Set the mqc_active_tenant cookie so subsequent requests resolve into {id}.
      description: |
        Used by the browser tenant switcher. SDK callers should prefer
        the X-Tenant-Id header instead — it's stateless and doesn't
        require cookie support.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Cookie set.
        '403':
          description: Caller is not a member of {id}.

  /api/v1/tenants/{id}/members:
    parameters: [{ $ref: '#/components/parameters/pathID' }]
    get:
      tags: [tenants]
      summary: List members of a tenant. Owner only.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Members.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Membership' }
        '403': { description: Caller is not an owner. }
    post:
      tags: [tenants]
      summary: Upsert a member (create or change role). Owner only.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_sub, role]
              properties:
                user_sub: { type: string, description: "JWT sub of the user to add." }
                username: { type: string, description: "Display name." }
                role: { $ref: '#/components/schemas/Role' }
      responses:
        '200':
          description: Upserted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Membership' }

  /api/v1/tenants/{id}/members/{user_sub}:
    parameters:
      - $ref: '#/components/parameters/pathID'
      - in: path
        name: user_sub
        required: true
        schema: { type: string }
    delete:
      tags: [tenants]
      summary: Remove a member. Owner only. Refuses removing the last owner.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Removed. }
        '400': { description: Refused (e.g. last owner). }
        '403': { description: Caller is not an owner. }
        '404': { description: Membership not found. }

  /api/v1/bridge/publish/{connectionId}:
    parameters:
      - name: connectionId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [bridge]
      summary: Publish a raw payload to the named MQ connection.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '200':
          description: Published.

  /api/v1/bridge/consume/{connectionId}:
    parameters:
      - name: connectionId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [bridge]
      summary: Consume one message from the named MQ connection.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Consumed message. Content-Type reflects the detected format.
          content:
            application/json: {}
            application/xml: {}
            application/octet-stream: {}

  /api/openapi.yaml:
    get:
      tags: [meta]
      summary: Serve this spec. Public — no auth required.
      responses:
        '200':
          description: OpenAPI 3.0 YAML.
          content:
            application/yaml: {}

  /api/v1/audit/verify:
    get:
      tags: [audit]
      summary: Walk the hash chain and report tampering / gaps.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Verification result with first-broken row if any.
          content:
            application/json: {}

  /api/v1/audit/{id}/diff:
    parameters:
      - $ref: '#/components/parameters/pathID'
    get:
      tags: [audit]
      summary: Resource diff for the named audit row (before → after JSON).
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Diff payload. }
        '404': { description: Audit row not found. }

  /api/v1/tokens:
    get:
      tags: [tokens]
      summary: List API tokens for the caller's tenant.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Token list (hash + metadata; never the secret). }
    post:
      tags: [tokens]
      summary: Mint a new API token. The plaintext secret is returned ONCE.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json: {}
      responses:
        '201': { description: Created. Includes the plaintext secret. }

  /api/v1/tokens/{id}:
    parameters:
      - $ref: '#/components/parameters/pathID'
    delete:
      tags: [tokens]
      summary: Revoke an API token.
      security: [{ sessionCookie: [] }]
      responses:
        '204': { description: Revoked. }
        '404': { description: Not found. }

  /api/v1/webhooks:
    get:
      tags: [webhooks]
      summary: List outbound webhook endpoints for the caller's tenant.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Webhook list. }
    post:
      tags: [webhooks]
      summary: Create a webhook (URL + event-type filters + HMAC secret).
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json: {}
      responses:
        '201': { description: Created. }

  /api/v1/webhooks/{id}:
    parameters:
      - $ref: '#/components/parameters/pathID'
    put:
      tags: [webhooks]
      summary: Replace a webhook's URL / filters / enabled state.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json: {}
      responses:
        '200': { description: Updated. }
        '404': { description: Not found. }
    delete:
      tags: [webhooks]
      summary: Delete a webhook.
      security: [{ sessionCookie: [] }]
      responses:
        '204': { description: Deleted. }
        '404': { description: Not found. }

  /api/v1/config/export:
    get:
      tags: [config]
      summary: Export the tenant's connections, schemas, scripts, and pipelines.
      description: |
        YAML by default. Send `Accept: application/json` (or `?format=json`)
        for the JSON representation the gitops client uses.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Bundle.
          content:
            application/yaml: {}
            application/json: {}

  /api/v1/config/import:
    post:
      tags: [config]
      summary: Apply a desired-state bundle. Admin only.
      description: |
        Accepts the same shape /api/v1/config/export emits. Upserts by
        name within the bundle's tenant. Deletions are not honoured —
        operators remove records explicitly.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/yaml: {}
          application/json: {}
      responses:
        '200': { description: Applied. Returns per-kind counts. }
        '403': { description: Not an admin. }

  /api/v1/events:
    get:
      tags: [events]
      summary: Server-sent stream of lifecycle events for the caller's tenant.
      description: |
        Long-lived `text/event-stream` connection. Emits pipeline started /
        stopped / reloaded, DLQ pushes, and similar lifecycle hooks. The
        admin UI uses this to keep dashboards live without polling.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Event stream.
          content:
            text/event-stream: {}

  /api/v1/leadership:
    get:
      tags: [meta]
      summary: Report this instance's role in the leader-election dance.
      description: |
        For multi-replica deploys behind a SQLite-backed lease. The
        leader runs the DLQ reaper and pipeline executors; followers
        serve read-only API. Single-replica deploys always report
        leader=true.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Leadership snapshot (role, leader id, expires_at).
          content:
            application/json: {}

  /api/v1/secrets/status:
    get:
      tags: [secrets]
      summary: Current secret-encryption key version + whether any rows are still on an older version.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Key-version summary. }

  /api/v1/secrets/rotate:
    post:
      tags: [secrets]
      summary: Mint a new key version and rewrap all stored passwords. Admin only.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Rotation complete. Returns rewrap counts. }
        '403': { description: Not an admin. }

  /api/v1/admin/backup:
    get:
      tags: [admin]
      summary: Stream a snapshot of the SQLite database (VACUUM INTO). System-admin only.
      description: |
        Produces a consistent point-in-time snapshot of the live
        database and streams it as `application/octet-stream`. The
        snapshot is itself a valid SQLite database — copy it over the
        live one (with the binary stopped) to restore. See
        OPERATIONS.md for the full restore procedure.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Snapshot bytes.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '403': { description: Not a system-admin. }
        '500': { description: Snapshot failed (disk full, permission, etc.). }

  /api/v1/admin/pprof:
    get:
      tags: [admin]
      summary: Runtime profiling index. System-admin only.
      description: |
        Net/http/pprof index page. Followed by per-profile endpoints
        documented separately. Used for production performance
        debugging via `go tool pprof`.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: HTML index of available profiles. }
        '403': { description: Not a system-admin. }

  /api/v1/admin/pprof/cmdline:
    get:
      tags: [admin]
      summary: Process command-line. System-admin only.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: text/plain command-line. }

  /api/v1/admin/pprof/profile:
    get:
      tags: [admin]
      summary: 30-second CPU profile (binary). System-admin only.
      description: |
        Blocks for the duration of the profile (default 30s, query
        param ?seconds=N). Server timeouts must accommodate.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Binary protobuf profile.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }

  /api/v1/admin/pprof/trace:
    get:
      tags: [admin]
      summary: Execution trace (binary). System-admin only.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Binary trace data.
          content:
            application/octet-stream: {}

  /api/v1/admin/pprof/symbol:
    get:
      tags: [admin]
      summary: Symbol lookup. System-admin only.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Symbol map. }
    post:
      tags: [admin]
      summary: Symbol lookup (POST form). System-admin only.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Symbol map. }

  /api/v1/admin/pprof/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          enum: [heap, goroutine, allocs, mutex, block, threadcreate]
    get:
      tags: [admin]
      summary: Named profile (heap, goroutine, etc.). System-admin only.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Binary profile.
          content:
            application/octet-stream: {}

  /api/v1/plugins:
    get:
      tags: [plugins]
      summary: List uploaded WASM plugins (metadata only). Authenticated.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Plugin metadata list (no blobs). }
    post:
      tags: [plugins]
      summary: Upload a WASM plugin. System-admin only.
      description: |
        multipart/form-data with fields `name` (string) and `blob`
        (the .wasm file). The blob is compiled via wazero before
        persisting — failed compile returns 400 with the reason.
        See docs/PLUGIN_DESIGN.md for the WASM contract.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name: { type: string }
                blob: { type: string, format: binary }
      responses:
        '201': { description: Created. Returns plugin metadata. }
        '400': { description: Validation failed (bad blob, missing exports, host imports, etc.). }
        '403': { description: Not a system-admin. }
        '413': { description: Blob exceeds 16 MiB cap. }

  /api/v1/plugins/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [plugins]
      summary: Download the plugin .wasm blob. System-admin only.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: WASM bytes.
          content:
            application/wasm:
              schema: { type: string, format: binary }
        '404': { description: Not found. }
    delete:
      tags: [plugins]
      summary: Remove a plugin. System-admin only.
      description: |
        Pipelines still referencing the plugin will fail to build on
        the next reload — disable them first if you don't want
        downtime.
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Deleted. }
        '404': { description: Not found. }

  /api/v1/admin/integrity:
    get:
      tags: [admin]
      summary: Run PRAGMA integrity_check on the live database. System-admin only.
      description: |
        Read-only but not free — a multi-GB database can take minutes.
        Returns 200 in both cases; the `ok` field discriminates clean
        from corrupted. On `ok=false` stop writes and restore from the
        most recent good snapshot.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Check completed. Body describes result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  duration_ms: { type: integer }
                  errors:
                    type: array
                    items: { type: string }
                    description: Present only when ok is false.
        '403': { description: Not a system-admin. }

  /api/v1/pipelines/{id}/replay:
    parameters:
      - $ref: '#/components/parameters/pathID'
    post:
      tags: [pipelines]
      summary: Re-run a historical time window through this pipeline.
      description: |
        Supported on Kafka and NATS JetStream sources. The replay opens
        a throwaway consumer scoped to `since..until` and pushes through
        the same stage chain as the live pipeline. Returns counts of
        messages read, sent, and dropped. Returns 400 for sources that
        don't retain consumed messages (RabbitMQ, MQTT, core NATS,
        AMQP 1.0).
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [since, until]
              properties:
                since: { type: string, format: date-time }
                until: { type: string, format: date-time }
      responses:
        '200':
          description: Replay summary.
          content:
            application/json: {}
        '400': { description: Source broker does not support replay, or window invalid. }

  /api/v1/preview:
    post:
      tags: [pipelines]
      summary: Dry-run a stage chain against a literal payload.
      description: |
        The pipeline editor uses this to show how each stage would
        transform a sample message before saving. No persistence, no
        side effects.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json: {}
      responses:
        '200': { description: Stage-by-stage trace + final output. }

  /api/v1/topology:
    get:
      tags: [pipelines]
      summary: Live topology snapshot — every broker connection, every pipeline, every live signal.
      description: |
        Single aggregator read for the Live Topology page. Combines the
        tenant's connections + pipelines with live metrics
        (msg_per_min, processed/failed counters, avg latency), DLQ
        depth per pipeline, circuit-breaker state, source-broker depth,
        and pool "connected" state. Best-effort: a failure in any
        sub-source (e.g. DLQ count query) logs a warn server-side and
        zero-fills that column rather than failing the response — a
        partial snapshot beats a 500. Viewer-readable; tenant-scoped.
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: Topology snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [generated_at, tenant_id, connections, pipelines]
                properties:
                  generated_at: { type: string, format: date-time }
                  tenant_id: { type: string }
                  connections:
                    type: array
                    items:
                      type: object
                      required: [id, name, type, connected]
                      properties:
                        id: { type: string }
                        name: { type: string }
                        type: { type: string, enum: [rabbitmq, kafka, ibm, mqtt, nats, amqp10] }
                        topic: { type: string }
                        depth: { type: integer, format: int64, nullable: true, description: "Broker-side backlog; null when unknown/unsupported" }
                        connected: { type: boolean, description: "Pool currently holds an open client for this broker" }
                  pipelines:
                    type: array
                    items:
                      type: object
                      required: [id, name, source_id, destination_id, enabled, msg_per_min, processed, failed, avg_latency_ms, dlq_depth, circuit_state, status]
                      properties:
                        id: { type: string }
                        name: { type: string }
                        source_id: { type: string }
                        destination_id: { type: string }
                        enabled: { type: boolean }
                        msg_per_min: { type: integer, format: int64 }
                        processed: { type: integer, format: int64 }
                        failed: { type: integer, format: int64 }
                        avg_latency_ms: { type: number, format: double }
                        dlq_depth: { type: integer, format: int64 }
                        circuit_state: { type: string, enum: [closed, open, half-open, unknown] }
                        shadow_destination_id: { type: string }
                        shadow_percent: { type: integer, minimum: 0, maximum: 100 }
                        route_destination_ids:
                          type: array
                          items: { type: string }
                        status: { type: string, enum: [connected, error, disabled, idle] }
                        last_error: { type: string }

  /api/v1/samples/extract:
    post:
      tags: [pipelines]
      summary: Pull one live message off a source connection and return it (no ack).
      description: |
        Used by the pipeline editor's "load a real sample" button.
        Reads a single message from the source so the operator can wire
        validate / filter / transform stages against actual traffic
        without seeding a fixture.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json: {}
      responses:
        '200':
          description: Captured sample (Content-Type matches detected format).
          content:
            application/json: {}
            application/xml: {}
            application/octet-stream: {}
